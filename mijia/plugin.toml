[plugin]
id = "mijia"
name = "米家智能家居"
description = "控制米家设备，让AI伙伴帮你开关灯、调节空调等"
short_description = "Control Xiaomi/Mijia smart home devices: lights, AC, sensors, scenes."
keywords = ["米家", "(?i)mijia", "小米", "(?i)xiaomi", "智能家居", "(?i)smart.?home", "开灯", "关灯", "空调", "设备", "(?i)device", "灯", "(?i)light", "开关"]
version = "1.0.0"
entry = "plugin.plugins.mijia:MijiaPlugin"

[plugin.author]
name = "N.E.K.O Team"

[plugin.i18n]
default_locale = "zh-CN"
locales_dir = "i18n"

[plugin.sdk]
recommended = ">=0.1.0,<0.2.0"
supported = ">=0.1.0,<0.3.0"

[plugin.ui]
enabled = true

[[plugin.ui.panel]]
id = "main"
title = "米家智能家居"
entry = "static/index.html"
context = "dashboard"
permissions = ["state:read", "action:call"]

[[plugin.ui.guide]]
id = "quickstart"
title = "快速开始"
entry = "docs/quickstart.md"
permissions = ["state:read"]

[plugin_runtime]
enabled = true
auto_start = false

[plugin.store]
enabled = false

# 运行时依赖（由 N.E.K.O 主环境提供，无需额外安装）：
# httpx, pydantic, qrcode, tenacity, cachetools