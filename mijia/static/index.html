<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page.title">米家插件配置 - N.E.K.O</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            padding: 24px;
            color: #1d1d1f;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 24px;
            margin-bottom: 24px;
            transition: box-shadow 0.2s;
        }

        .card h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card h2 .badge {
            background: #e8e8ed;
            font-size: 0.75rem;
            font-weight: normal;
            padding: 2px 8px;
            border-radius: 20px;
            color: #6c6c70;
        }

        .status-bar {
            background: #f9f9fb;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border-left: 4px solid #007aff;
        }

        .status-bar.success {
            border-left-color: #34c759;
            background: #eaf7e6;
        }
        .status-bar.error {
            border-left-color: #ff3b30;
            background: #ffe9e8;
        }
        .status-bar.warning {
            border-left-color: #ff9500;
            background: #fff4e5;
        }

        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #6c6c70;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d9d9df;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0,122,255,0.1);
        }
        button {
            background: #007aff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            background: #005fc5;
        }
        button.secondary {
            background: #6c6c70;
        }
        button.secondary:hover {
            background: #4c4c4e;
        }
        button.danger {
            background: #ff3b30;
        }
        button.danger:hover {
            background: #d70015;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .qr-container {
            text-align: center;
            margin: 20px 0;
        }
        .qr-container img {
            max-width: 200px;
            border: 1px solid #e5e5ea;
            border-radius: 16px;
            padding: 8px;
            background: white;
        }
        .info-text {
            font-size: 0.85rem;
            color: #8e8e93;
            margin-top: 8px;
        }
        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #e5e5ea;
        }
        .device-list {
            margin-top: 16px;
        }
        .device-item {
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .device-item-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .device-name {
            font-weight: 500;
        }
        .device-status {
            font-size: 0.8rem;
            color: #8e8e93;
        }
        .device-status.online {
            color: #34c759;
        }
        .device-status.offline {
            color: #ff3b30;
        }
        .alias-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }
        .alias-row label {
            font-size: 0.75rem;
            color: #8e8e93;
            margin: 0;
            white-space: nowrap;
        }
        .alias-row input {
            flex: 1;
            padding: 4px 8px;
            border: 1px solid #d9d9df;
            border-radius: 8px;
            font-size: 0.8rem;
            max-width: 200px;
        }
        .alias-row button {
            padding: 4px 10px;
            font-size: 0.75rem;
            border-radius: 8px;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e5e5ea;
            border-top-color: #007aff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .hidden {
            display: none;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 16px;
        }
        .scene-list {
            margin-top: 12px;
        }
        .scene-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .scene-item:last-child {
            border-bottom: none;
        }
        .scene-name {
            font-weight: 500;
        }
        .scene-id {
            font-size: 0.75rem;
            color: #8e8e93;
        }
        .btn-green {
            background: #34c759;
        }
        .btn-green:hover {
            background: #248a3d;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2><span data-i18n="header.title">🔌 米家设备控制器</span> <span class="badge" data-i18n="header.badge">插件配置</span></h2>
        <div id="statusMessage" class="status-bar warning" data-i18n="status.checking">⚙️ 正在检查登录状态...</div>

        <!-- 二维码登录区 -->
        <div class="card" id="qrSection">
            <h3 data-i18n="account.qr_title">📱 二维码登录</h3>
            <p class="info-text" data-i18n="account.qr_hint">使用米家APP扫码登录，推荐方式（更安全）</p>
            <div class="btn-group">
                <button id="qrLoginBtn" data-i18n="account.get_qr">获取二维码</button>
                <button id="cancelPollBtn" class="secondary hidden" data-i18n="account.stop_poll">停止轮询</button>
            </div>
            <div id="qrDisplay" class="qr-container hidden">
                <img id="qrImage" alt="二维码" data-i18n-title="account.qr_alt" />
                <p class="info-text" data-i18n="account.scan_hint">请使用米家APP扫描二维码</p>
            </div>
        </div>

        <!-- 状态与操作区 -->
        <div class="card">
            <div class="flex-between">
                <h3 data-i18n="status.title">📡 当前状态</h3>
                <button id="logoutBtn" class="danger" data-i18n="account.logout">登出</button>
            </div>
            <div id="userInfo"></div>
            <div id="homeList"></div>
            <div id="deviceList" class="device-list"></div>
            <button id="refreshStatusBtn" class="secondary" style="margin-top: 16px;" data-i18n="status.refresh">刷新状态</button>
        </div>

        <!-- 场景列表区 -->
        <div class="card" id="sceneCard">
            <div class="flex-between">
                <h3 data-i18n="scene.title">🎬 智能场景</h3>
                <button id="refreshScenesBtn" class="secondary" data-i18n="scene.refresh">刷新场景</button>
            </div>
            <div id="sceneList" class="scene-list"></div>
        </div>

        <!-- 智能控制区 -->
        <div class="card" id="controlCard">
            <h3 data-i18n="control.title">🎮 智能控制</h3>
            <p class="info-text" data-i18n="control.hint">输入控制命令，支持以下格式：</p>
            <ul class="info-text" style="margin: 8px 0 16px 20px; line-height: 1.8;">
                <li><strong data-i18n="control.example_light_label">开灯/关灯</strong><span data-i18n="control.example_separator">：</span><code data-i18n="control.example_light_a">打开客厅灯</code><span data-i18n="control.example_or">、</span><code data-i18n="control.example_light_b">关闭卧室灯</code></li>
                <li><strong data-i18n="control.example_ac_label">空调控制</strong><span data-i18n="control.example_separator">：</span><code data-i18n="control.example_ac_a">打开空调</code><span data-i18n="control.example_or">、</span><code data-i18n="control.example_ac_b">关闭空调</code></li>
                <li><strong data-i18n="control.example_plug_label">插座控制</strong><span data-i18n="control.example_separator">：</span><code data-i18n="control.example_plug_a">打开插座</code><span data-i18n="control.example_or">、</span><code data-i18n="control.example_plug_b">关闭卧室插座</code></li>
            </ul>
            <div class="form-group">
                <input type="text" id="controlInput" data-i18n-placeholder="control.placeholder" placeholder="输入控制命令，例如：打开客厅灯" />
            </div>
            <div class="btn-group">
                <button id="controlBtn" data-i18n="control.send">发送命令</button>
                <button id="clearControlBtn" class="secondary" data-i18n="control.clear">清空</button>
            </div>
            <div id="controlResult" style="margin-top: 12px; font-size: 0.85rem;"></div>
        </div>
    </div>
</div>

<script>
    // 插件ID与 plugin.toml 中的 id 字段保持一致
    const PLUGIN_ID = 'mijia';
    // 插件服务器运行在 agent_server 内（默认 48916），UI 页面从同一端口提供
    // 使用相对路径以兼容端口变化
    const RUNS_URL = '/runs';

    // 辅助函数：调用插件入口（通过 /runs 创建执行任务，轮询等待完成，再取 export 结果）
    async function callPlugin(entry, args = {}) {
        // 1. 创建 Run
        const createResp = await fetch(RUNS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                plugin_id: PLUGIN_ID,
                entry_id: entry,
                args: args
            })
        });
        if (!createResp.ok) {
            const text = await createResp.text();
            throw new Error(`${I18n.t('error.create_run_failed', '创建任务失败')} HTTP ${createResp.status}: ${text}`);
        }
        const runData = await createResp.json();
        const runId = runData.run_id || runData.id;
        if (!runId) throw new Error(I18n.t('error.no_run_id', '未获取到 run_id'));

        // 2. 轮询等待完成（最多 120 秒）
        const deadline = Date.now() + 120000;
        while (Date.now() < deadline) {
            await new Promise(r => setTimeout(r, 300));
            const pollResp = await fetch(`${RUNS_URL}/${runId}`);
            if (!pollResp.ok) continue;
            const runRecord = await pollResp.json();
            const status = runRecord.status;
            if (status === 'succeeded') {
                // 3. 取 export 结果（插件通过 Ok({...}) 返回的数据）
                const exportResp = await fetch(`${RUNS_URL}/${runId}/export`);
                if (!exportResp.ok) return {};
                const exportData = await exportResp.json();
                const items = exportData.items || [];
                // 找到 type=json 的 item（插件响应被包装在 json 字段里）
                const resultItem = items.find(i => i.type === 'json' && i.json) || items[0];
                if (!resultItem) return {};
                // 插件响应格式: {success: true, data: {...}, ...}
                const pluginResponse = resultItem.json || {};
                if (pluginResponse.success === false || pluginResponse.error) {
                    throw new Error(pluginResponse.error?.message || pluginResponse.message || I18n.t('error.plugin_call_failed', '插件调用失败'));
                }
                // 返回实际的 data 内容
                return pluginResponse.data || {};
            } else if (status === 'failed' || status === 'canceled' || status === 'timeout') {
                const err = runRecord.error?.message || runRecord.message || status;
                throw new Error(`${I18n.t('error.plugin_exec_failed', '插件执行失败')}: ${err}`);
            }
            // pending / running 继续轮询
        }
        throw new Error(I18n.t('error.plugin_call_timeout', '插件调用超时'));
    }

    // 显示消息
    function showMessage(text, type = 'warning') {
        const msgDiv = document.getElementById('statusMessage');
        msgDiv.textContent = text;
        msgDiv.className = `status-bar ${type}`;
    }

    // 加载当前状态（家庭、设备）
    // refresh=true 时强制从网络获取，否则优先读缓存
    async function loadStatus(refresh = false) {
        try {
            // 先重新加载凭据（防止插件重载后凭据未及时加载导致显示未登录）
            await callPlugin('reload_credential', {});
            const homes = await callPlugin('list_homes', {});
            if (homes && homes.homes && homes.homes.length) {
                const home = homes.homes[0];
                if (!home.id) {
                    showMessage(I18n.t('error.empty_home_id', '❌ 家庭ID为空，无法获取设备列表'), 'error');
                    document.getElementById('userInfo').innerHTML = `<p>${I18n.t('home.current_label', '🏠 当前家庭：')}${escapeHtml(home.name) || I18n.t('home.unknown', '未知')}</p>`;
                    document.getElementById('deviceList').innerHTML = '';
                    return;
                }
                showMessage(`${I18n.t('status.logged_in_with_home', '✅ 已登录，家庭：')}${escapeHtml(home.name)}`, 'success');
                document.getElementById('userInfo').innerHTML = `<p>${I18n.t('home.current_label', '🏠 当前家庭：')}${escapeHtml(home.name)} (ID: ${escapeHtml(home.id)})</p>`;
                // 获取设备列表（refresh=true 时强制从网络拉取）
                const devicesRes = await callPlugin('list_devices', { home_id: home.id, refresh: refresh });
                if (devicesRes && devicesRes.devices) {
                    const devices = devicesRes.devices;
                    let html = `<p><strong>${I18n.t('device.list_header', '📱 设备列表（可设置别名方便控制）：')}</strong></p>`;
                    devices.forEach(dev => {
                        const statusClass = dev.is_online ? 'online' : 'offline';
                        const statusText = dev.is_online ? I18n.t('device.online', '在线') : I18n.t('device.offline', '离线');
                        const alias = escapeHtml(dev.alias || '');
                        html += `<div class="device-item">
                                    <div class="device-item-top">
                                        <span class="device-name">${escapeHtml(dev.name)}</span>
                                        <span class="device-status ${statusClass}">${statusText}</span>
                                    </div>
                                    <div class="alias-row">
                                        <label>${I18n.t('device.alias_label', '别名：')}</label>
                                        <input type="text" id="alias-${dev.did}" value="${alias}" placeholder="${I18n.t('device.alias_placeholder', '多个别名用逗号分隔')}">
                                        <button onclick="saveAlias('${dev.did}')">${I18n.t('device.alias_save', '保存')}</button>
                                    </div>
                                </div>`;
                    });
                    document.getElementById('deviceList').innerHTML = html;
                } else {
                    document.getElementById('deviceList').innerHTML = `<p>${I18n.t('device.empty', '暂无设备')}</p>`;
                }
                document.getElementById('homeList').innerHTML = '';
            } else {
                showMessage(I18n.t('status.not_logged_in', '❌ 未登录或没有家庭，请先登录'), 'error');
                document.getElementById('userInfo').innerHTML = '';
                document.getElementById('deviceList').innerHTML = '';
            }
        } catch (err) {
            console.error(err);
            showMessage(`${I18n.t('error.status_load_failed', '状态加载失败：')}${err.message}`, 'error');
            document.getElementById('userInfo').innerHTML = '';
            document.getElementById('deviceList').innerHTML = '';
        }
    }

    // 简单防XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 二维码登录流程
    let pollInterval = null;
    let isPollingInFlight = false;  // 防止并发轮询的闸门
    let pollGeneration = 0;  // 轮询代际计数器，用于废弃旧周期的请求

    async function startQrLogin() {
        try {
            const qrData = await callPlugin('start_qrcode_login', {});
            if (!qrData.qr_url) throw new Error(I18n.t('error.no_qr_url', '未获取到二维码URL'));
            const qrImg = document.getElementById('qrImage');
            qrImg.src = qrData.qr_url;
            document.getElementById('qrDisplay').classList.remove('hidden');
            showMessage(I18n.t('account.scan_hint', '请使用米家APP扫描二维码'), 'info');

            // 废弃旧轮询并开启新一轮
            if (pollInterval) clearInterval(pollInterval);
            isPollingInFlight = false;
            const gen = ++pollGeneration;  // 获取当前代际编号

            pollInterval = setInterval(async () => {
                // 如果上一次请求还没完成，跳过这次
                if (isPollingInFlight) return;
                // 如果代际已变化（新一轮已开始），废弃本次回调
                if (gen !== pollGeneration) return;

                isPollingInFlight = true;
                try {
                    const result = await callPlugin('check_login_status', { login_url: qrData.login_url });
                    // 代际检查：双重保险，防止旧请求在 stop→start 之间返回
                    if (gen !== pollGeneration) return;
                    if (result.success) {
                        clearInterval(pollInterval);
                        pollInterval = null;
                        showMessage(I18n.t('account.login_success', '✅ 登录成功！'), 'success');
                        document.getElementById('qrDisplay').classList.add('hidden');
                        document.getElementById('cancelPollBtn').classList.add('hidden');
                        await loadStatus();
                        loadScenes();
                    } else if (result.message && result.message.includes('超时')) {
                        clearInterval(pollInterval);
                        pollInterval = null;
                        showMessage(I18n.t('account.login_timeout', '⏰ 登录超时，请重试'), 'error');
                        document.getElementById('qrDisplay').classList.add('hidden');
                        document.getElementById('cancelPollBtn').classList.add('hidden');
                    }
                } catch (err) {
                    console.warn('轮询错误', err);
                } finally {
                    isPollingInFlight = false;
                }
            }, 2000);
            document.getElementById('cancelPollBtn').classList.remove('hidden');
        } catch (err) {
            showMessage(`${I18n.t('account.qr_login_failed', '二维码登录失败：')}${err.message}`, 'error');
        }
    }

    function stopPolling() {
        if (pollInterval) {
            clearInterval(pollInterval);
            pollInterval = null;
            showMessage(I18n.t('account.poll_stopped', '已停止轮询'), 'warning');
            document.getElementById('qrDisplay').classList.add('hidden');
            document.getElementById('cancelPollBtn').classList.add('hidden');
        }
    }

    // 保存设备别名
    async function saveAlias(did) {
        const input = document.getElementById('alias-' + did);
        const alias = input.value.trim();
        try {
            await callPlugin('set_device_alias', { did, alias });
            showMessage(alias ? `${I18n.t('device.alias_saved_prefix', '✅ 别名已保存为：')}${alias}` : I18n.t('device.alias_cleared', '✅ 别名已清除'), 'success');
        } catch (err) {
            showMessage(`${I18n.t('device.alias_save_failed', '保存失败：')}${err.message}`, 'error');
        }
    }

    // 加载场景列表
    async function loadScenes(refresh = false) {
        const sceneListEl = document.getElementById('sceneList');
        sceneListEl.innerHTML = `<span class="loading"></span> ${I18n.t('ui.loading', '加载中...')}`;
        try {
            const result = await callPlugin('list_scenes', { refresh: refresh });
            const scenes = result.scenes || [];
            if (scenes.length === 0) {
                sceneListEl.innerHTML = `<p class="info-text">${I18n.t('scene.empty', '暂无可用场景')}</p>`;
                return;
            }
            let html = '';
            scenes.forEach(s => {
                html += `<div class="scene-item">
                    <div>
                        <div class="scene-name">${escapeHtml(s.name || '')}</div>
                        <div class="scene-id">ID: ${escapeHtml(s.id || '')}</div>
                    </div>
                    <button class="btn-green scene-exec-btn"
                        data-scene-id="${escapeHtml(s.id || '')}"
                        data-scene-name="${escapeHtml(s.name || '')}">${I18n.t('scene.execute', '执行')}</button>
                </div>`;
            });
            sceneListEl.innerHTML = html;
            // 事件委托，避免 onclick 字符串注入
            sceneListEl.querySelectorAll('.scene-exec-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    executeScene(btn.dataset.sceneId, btn.dataset.sceneName);
                });
            });
        } catch (err) {
            sceneListEl.innerHTML = `<p class="info-text" style="color:#ff3b30">${I18n.t('scene.load_failed', '加载失败：')}${escapeHtml(err.message)}</p>`;
        }
    }

    // 执行场景（通过 smart_control 入口，scene 执行已合并到统一控制）
    async function executeScene(sceneId, sceneName) {
        try {
            showMessage(`${I18n.t('scene.executing_prefix', '正在执行「')}${sceneName}${I18n.t('scene.executing_suffix', '」...')}`, 'info');
            const result = await callPlugin('smart_control', { command: `执行${sceneName}` });
            if (result.success) {
                showMessage(`${I18n.t('scene.executed_prefix', '✅「')}${sceneName}${I18n.t('scene.executed_suffix', '」执行成功！')}`, 'success');
            } else {
                showMessage(`${I18n.t('scene.failed_prefix', '❌「')}${sceneName}${I18n.t('scene.failed_suffix', '」执行失败：')}${result.message || I18n.t('error.unknown', '未知错误')}`, 'error');
            }
        } catch (err) {
            showMessage(`${I18n.t('scene.exec_failed', '❌ 执行失败：')}${err.message}`, 'error');
        }
    }

    // 登出
    async function logout() {
        try {
            await callPlugin('logout', {});
            showMessage(I18n.t('account.logged_out', '已登出，请重新登录'), 'success');
            document.getElementById('userInfo').innerHTML = '';
            document.getElementById('deviceList').innerHTML = '';
            document.getElementById('homeList').innerHTML = '';
            document.getElementById('sceneList').innerHTML = '';
        } catch (err) {
            showMessage(`${I18n.t('account.logout_failed', '登出失败：')}${err.message}`, 'error');
        }
    }

    // 智能控制：发送命令（调用 smart_control 入口，支持自然语言）
    async function sendControlCommand() {
        const input = document.getElementById('controlInput');
        const command = input.value.trim();
        if (!command) {
            showMessage(I18n.t('control.empty_command', '请输入控制命令'), 'warning');
            return;
        }

        const resultDiv = document.getElementById('controlResult');
        resultDiv.style.color = '#6c6c70';
        resultDiv.textContent = I18n.t('control.executing', '⏳ 命令执行中...');

        try {
            const result = await callPlugin('smart_control', { command: command });
            if (result.success) {
                resultDiv.style.color = '#34c759';
                resultDiv.textContent = `✅ ${escapeHtml(result.message || I18n.t('control.executed_default', '命令已执行'))}`;
                input.value = '';
                // 3秒后刷新设备状态
                setTimeout(() => loadStatus(true), 3000);
            } else {
                resultDiv.style.color = '#ff3b30';
                resultDiv.textContent = `❌ ${escapeHtml(result.message || I18n.t('error.unknown', '未知错误'))}`;
            }
        } catch (err) {
            resultDiv.style.color = '#ff3b30';
            resultDiv.textContent = `❌ ${I18n.t('control.exec_error', '执行出错：')}${escapeHtml(err.message)}`;
        }
    }

    // 清空控制输入
    function clearControlInput() {
        document.getElementById('controlInput').value = '';
        document.getElementById('controlResult').textContent = '';
    }

    // 页面初始化
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('qrLoginBtn').addEventListener('click', startQrLogin);
        document.getElementById('cancelPollBtn').addEventListener('click', stopPolling);
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('refreshStatusBtn').addEventListener('click', () => loadStatus(true));
        document.getElementById('refreshScenesBtn').addEventListener('click', () => loadScenes(true));
        document.getElementById('controlBtn').addEventListener('click', sendControlCommand);
        document.getElementById('clearControlBtn').addEventListener('click', clearControlInput);
        // 支持回车键发送（跳过输入法组合态，防止中文选词时误触发）
        document.getElementById('controlInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.isComposing) sendControlCommand();
        });
        // First loadStatus() must wait for the locale bundle: I18n._lang is
        // initialized to 'zh-CN' synchronously at script-load time, so the
        // old `I18n._lang` check passed before the async fetch finished and
        // status / device / scene text rendered with Chinese fallbacks under
        // non-default locales. I18n.whenReady gates on the actual ready
        // flag, runs synchronously if the bundle already arrived, otherwise
        // queues on the `i18n-ready` event — covers both DOM ↔ fetch races.
        if (window.I18n?.whenReady) {
            I18n.whenReady(() => loadStatus());
        } else {
            // i18n.js failed to load — best-effort render with fallbacks.
            loadStatus();
        }
    });
</script>
<script src="i18n.js"></script>
</body>
</html>
